version: '3.8'
services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: defecttracker
      POSTGRES_PASSWORD: defecttracker
      POSTGRES_DB: defecttracker
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://defecttracker:defecttracker@db:5432/defecttracker
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - ./backend/uploads:/usr/src/app/uploads

volumes:
  db_data:
