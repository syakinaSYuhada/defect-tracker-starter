name: Backend Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: defecttracker_test
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      JWT_SECRET: test_secret
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/defecttracker_test
      
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Wait for Postgres (resolve container IP and check)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client dnsutils
          echo "Trying to resolve 'postgres' via DNS and /etc/hosts"
          getent hosts postgres || true
          cat /etc/hosts | grep -E "postgres" || true
          echo "If DNS fails, locate the Postgres service container and use its IP"
          CONTAINER=$(docker ps --filter "ancestor=postgres:16" --format '{{.ID}}' | head -n1)
          if [ -z "$CONTAINER" ]; then
            echo "No direct container found by ancestor filter; trying name filter"
            CONTAINER=$(docker ps --format '{{.ID}} {{.Names}}' | grep postgres || true | awk '{print $1}' | head -n1)
          fi
          echo "Detected container id: $CONTAINER"
          if [ -n "$CONTAINER" ]; then
            POSTGRES_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' $CONTAINER)
            echo "Postgres container IP: $POSTGRES_IP"
            echo "$POSTGRES_IP postgres" | sudo tee -a /etc/hosts
            echo "POSTGRES_HOST=postgres" >> $GITHUB_ENV
            echo "DATABASE_URL=postgres://postgres:postgres@postgres:5432/defecttracker_test" >> $GITHUB_ENV
            export POSTGRES_HOST=postgres
          else
            echo "No Postgres container found; will attempt to use hostname 'postgres'"
            echo "POSTGRES_HOST=postgres" >> $GITHUB_ENV
            echo "DATABASE_URL=postgres://postgres:postgres@postgres:5432/defecttracker_test" >> $GITHUB_ENV
            export POSTGRES_HOST=postgres
          fi
          echo "Attempting pg_isready checks (will try 60 times):"
          for i in $(seq 1 60); do
            echo "Attempt $i: $(date -u +%T)"
            if pg_isready -h "$POSTGRES_HOST" -p 5432 -U postgres >/dev/null 2>&1; then
              echo "Postgres is available at $POSTGRES_HOST"; exit 0
            fi
            sleep 1
          done
          echo "Last pg_isready debug output:" 
          pg_isready -h "$POSTGRES_HOST" -p 5432 -U postgres || true
          echo "Postgres did not become available"; exit 1

      - name: Run Test Schema (migrate)
        run: npm run db:migrate:test

      - name: Seed Test Database
        run: npm run db:seed:test

      - name: Run Tests
        run: npm run test:ci
